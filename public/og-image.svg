<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Grid Background -->
  <rect width="100%" height="100%" fill="#FFFFFF"/>
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#000000" fill-opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Neobrutalist 3D Box for Content -->
  <rect x="90" y="90" width="1020" height="450" fill="#000000" rx="10"/>
  <rect x="80" y="80" width="1020" height="450" fill="#FFE600" stroke="#000000" stroke-width="8" rx="10"/>
  
  <!-- Left Side Stripe Accent -->
  <rect x="80" y="80" width="30" height="450" fill="#FF90E8" stroke="#000000" stroke-width="8" rx="10"/>

  <!-- Heading Name -->
  <text x="170" y="240" font-family="Archivo, Arial Black, sans-serif" font-size="110" font-weight="900" fill="#000000" letter-spacing="-3">FAYAZ UNAS</text>

  <!-- Tagline / Title -->
  <text x="175" y="320" font-family="Space Grotesk, Helvetica, sans-serif" font-size="36" font-weight="700" fill="#000000" letter-spacing="1">COMPUTER SCIENCE ENGINEER</text>

  <!-- Thick Neobrutalist Line Divider -->
  <line x1="175" y1="360" x2="800" y2="360" stroke="#000000" stroke-width="8"/>

  <!-- Sub-details -->
  <text x="175" y="420" font-family="Space Grotesk, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#000000" fill-opacity="0.6">PORTFOLIO &amp; TECHNICAL ARTIFACTS</text>
  <text x="175" y="460" font-family="Space Mono, Courier, monospace" font-size="20" font-weight="700" fill="#000000" fill-opacity="0.5">Systems Architecture · RISC-V · Full-Stack</text>
</svg>
